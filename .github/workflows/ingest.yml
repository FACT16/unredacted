name: Nightly ingest

# Re-pull all public sources every day and commit the refreshed corpus. The commit
# to main triggers the Pages deploy workflow, so new government drops appear on the
# site automatically. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "17 9 * * *" # 09:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch the deploy workflow after committing

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Ingest latest government records
        run: npm run ingest
        working-directory: apps/web
        # Optional: add a repo secret DATA_GOV_API_KEY for higher GovInfo/NARA limits.
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}

      # Pull each document's full text from the source (server-side, no CORS) and
      # bake in the people/orgs it names + a real extracted description/excerpt —
      # powers connection search and per-doc info, no backend.
      - name: Enrich with full-text entities + descriptions
        run: node scripts/enrich.mjs
        working-directory: apps/web

      - name: Refresh official imagery (Library of Congress)
        run: node scripts/images.mjs
        working-directory: apps/web

      - name: Audit source links
        run: node scripts/audit-links.mjs
        working-directory: apps/web

      - name: Commit refreshed corpus if changed
        id: commit
        run: |
          git config user.name "Anderson Davis"
          git config user.email "amdavis2024@icloud.com"
          if git diff --quiet -- apps/web/lib/generated-documents.json apps/web/lib/generated-images.json; then
            echo "No corpus changes today."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            count=$(node -e "console.log(require('./apps/web/lib/generated-documents.json').length)")
            imgs=$(node -e "console.log(require('./apps/web/lib/generated-images.json').length)")
            git add apps/web/lib/generated-documents.json apps/web/lib/generated-images.json
            git commit -m "chore(corpus): nightly ingest — ${count} records, ${imgs} images"
            git push
            echo "Pushed refreshed corpus (${count} records, ${imgs} images)."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with GITHUB_TOKEN does not trigger the deploy workflow (GitHub's
      # anti-loop safeguard), so dispatch it explicitly — workflow_dispatch is exempt.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
